spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none

  liquibase:
    enabled: true

  h2:
    console:
      enabled: true

integration:
  employee-url: http://localhost:${wiremock.port:8089}
wiremock:
  port: 8089