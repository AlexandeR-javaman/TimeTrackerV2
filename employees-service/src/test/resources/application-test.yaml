spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  liquibase:
    enabled: false

server:
  port: 0

wiremock:
  keycloak:
    port: 9998
  logentry:
    port: 9999

keycloak:
  auth-server-url: http://localhost:${wiremock.keycloak.port}
  realm: Employees_realm
  clientId: employee_service
  userName: realmclient
  password: realmclient

log-entry-service:
  url: http://localhost:${wiremock.logentry.port}
